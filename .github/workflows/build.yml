# Build and test open-bamboo-networking on Linux x64 / aarch64 and on
# Windows x64 (MSVC + vcpkg manifest).
#
# Version strategy: the plugin must report a string whose first 8 characters
# match Bambu Studio's SLIC3R_VERSION. We therefore look up the most recent
# tag in https://github.com/bambulab/BambuStudio.git at CI time, strip the
# leading "v", and bump the last component to "99" (same rule ./configure
# uses for local auto-detection). This means CI follows upstream releases
# automatically -- no manual version bumps in this repo.
#
# Linux artifacts (one set per ABI version / architecture):
#   * libbambu_networking.so
#   * libBambuSource.so
#   * liblive555.so
#   * network_plugins.json
#
# Windows artifacts (one set per ABI version):
#   * bambu_networking.dll
#   * BambuSource.dll
#   * live555.dll (stub)
#   * network_plugins.json
#   * ota/plugins/
#
# macOS artifacts (one set per ABI version):
#   * libbambu_networking.dylib
#   * libBambuSource.dylib
#   * liblive555.dylib
#   * network_plugins.json

name: Build

on:
  push:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: v${{ matrix.abi }}.xx-linux-${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        abi:
          - 02.03.00
          - 02.03.01
          - 02.04.00
          - 02.05.00
          - 02.05.01
          - 02.05.02
          - 02.05.03
          - 02.06.00
          - 02.06.01
        arch:
          - x64
          - aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config ca-certificates git \
            libcjson-dev uthash-dev libcurl4-openssl-dev libssl-dev zlib1g-dev

      - name: Configure
        run: |
          ./configure \
            --build-type=Release \
            --enable-tests \
            --with-version='${{ matrix.abi }}.99' \
            --no-conf-patch

      - name: Build
        run: make -j"$(nproc)"

      - name: Run tests
        # The only ctest target that does real I/O is `lan_live`, and it
        # self-skips when OBN_PRINTER_IP / _SERIAL / _ACCESS_CODE are unset,
        # which is always the case here. `plugin_symbols` is a pure dlopen
        # smoke test and exercises every ABI symbol Studio looks up.
        run: make test

      - name: Verify built plugin exports every ABI symbol
        # Nightly abi-compat workflow compares source-side files only.
        # This step additionally nm's the freshly built .so to confirm we
        # did not lose any exported entry point in this architecture's toolchain.
        run: tools/check_abi_compat.sh --so=build/libbambu_networking.so

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p dist
          cp build/libbambu_networking.so dist/
          cp build/libBambuSource.so      dist/
          cp build/liblive555.so          dist/
          cp build/network_plugins.json   dist/
          ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: obn-linux-v${{ matrix.abi }}.xx-${{ matrix.arch }}
          path: dist/
          if-no-files-found: error

  build-windows:
    name: v${{ matrix.abi }}.xx-windows-x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        abi:
          - 02.03.00
          - 02.03.01
          - 02.04.00
          - 02.05.00
          - 02.05.01
          - 02.05.02
          - 02.05.03
          - 02.06.00
          - 02.06.01

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = Join-Path $env:GITHUB_WORKSPACE "install"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          .\configure.ps1 `
            -ClientType bambu_studio `
            -WithVersion '${{ matrix.abi }}.99' `
            -Prefix $staging `
            -PatchConf:$false `
            -RegisterDShowFilter:$false `
            -EnableTests:$true

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --build build --config Release --parallel

      - name: Test (probe_plugin)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location build
          ctest -C Release --output-on-failure
          Pop-Location

      - name: Install
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake --install build --config Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:GITHUB_WORKSPACE "install"
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item -Path (Join-Path $src 'plugins\*') -Destination $dist -Force
          $ota = Join-Path $src 'ota'
          if (Test-Path $ota) {
            Copy-Item -Path $ota -Destination (Join-Path $dist 'ota') -Recurse -Force
          }
          Get-ChildItem -Recurse $dist | Format-Table FullName,Length -AutoSize

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: obn-v${{ matrix.abi }}.xx-windows-x64
          path: dist/
          if-no-files-found: error

  build-macos:
    name: v${{ matrix.abi }}.xx-macos
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - 02.03.00
          - 02.03.01
          - 02.04.00
          - 02.05.00
          - 02.05.01
          - 02.05.02
          - 02.05.03
          - 02.06.00
          - 02.06.01

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          set -eu
          for pkg in pkg-config cmake openssl@3 curl cjson zlib uthash; do
            brew list "$pkg" &>/dev/null || brew install "$pkg"
          done
          {
            echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)"
            PC="$(brew --prefix openssl@3)/lib/pkgconfig"
            PC="${PC}:$(brew --prefix curl)/lib/pkgconfig"
            PC="${PC}:$(brew --prefix zlib)/lib/pkgconfig"
            PC="${PC}:$(brew --prefix cjson)/lib/pkgconfig"
            echo "PKG_CONFIG_PATH=${PC}"
          } >> "$GITHUB_ENV"

      - name: Configure
        run: |
          ./configure \
            --build-type=Release \
            --enable-tests \
            --with-version='${{ matrix.abi }}.99' \
            --no-conf-patch

      - name: Build
        run: make -j"$(sysctl -n hw.ncpu)"

      - name: Run tests
        run: make test

      - name: Verify built plugin exports every ABI symbol
        run: tools/check_abi_compat.sh --so=build/libbambu_networking.dylib

      - name: Stage artifacts
        run: |
          set -eu
          mkdir -p dist
          cp build/libbambu_networking.dylib dist/
          cp build/libBambuSource.dylib      dist/
          cp build/liblive555.dylib          dist/
          cp build/network_plugins.json      dist/
          ls -l dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: obn-macos-v${{ matrix.abi }}.xx
          path: dist/
          if-no-files-found: error

  package:
    name: Package distributions
    needs: [build, build-windows, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Assemble distribution archives
        run: scripts/package-dist.sh artifacts dist-out

      - name: Upload distribution archives
        uses: actions/upload-artifact@v6
        with:
          name: obn-distributions
          path: |
            dist-out/*.tar.gz
            dist-out/*.zip
          if-no-files-found: error

  pages:
    name: Deploy download page
    needs: [package]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download distribution archives
        uses: actions/download-artifact@v6
        with:
          name: obn-distributions
          path: dist-out/

      - name: Generate download page
        run: |
          set -eu
          mkdir -p site

          COMMIT="${GITHUB_SHA}"
          SHORT="${COMMIT:0:7}"
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          REPO="${GITHUB_REPOSITORY}"

          # Build table rows from archive files
          ROWS=""
          for f in dist-out/*.tar.gz dist-out/*.zip; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            cp "$f" "site/$name"

            # Extract platform from filename
            case "$name" in
              *linux-x64*)     platform="Linux x64" ;;
              *linux-aarch64*) platform="Linux aarch64" ;;
              *windows-x64*)   platform="Windows x64" ;;
              *macos*)         platform="macOS (Apple Silicon + Intel)" ;;
              *)               platform="$name" ;;
            esac

            ROWS="${ROWS}<tr><td>${platform}</td>"
            ROWS="${ROWS}<td><a href=\"${name}\">${name}</a></td>"
            ROWS="${ROWS}<td>${size}</td></tr>\n"
          done

          sed \
            -e "s|@COMMIT@|${COMMIT}|g" \
            -e "s|@SHORT_COMMIT@|${SHORT}|g" \
            -e "s|@DATE@|${DATE}|g" \
            -e "s|@REPO@|${REPO}|g" \
            -e "s|@TABLE_ROWS@|${ROWS}|g" \
            packaging/pages-index.html.in > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
